name: NADRA DevSecOps Pipeline

on:
  push:
    branches: [ main ]

permissions:
  issues: write
  contents: read

env:
  ACR_NAME: nadraacr.azurecr.io
  INFRA_REPO: pixelopscloud/nadra-infra

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.organization=pixelopscloud
          -Dsonar.projectKey=pixelopscloud_nadra-app

  build-push-deploy-dev:
    runs-on: ubuntu-latest
    needs: sonarcloud
    steps:
    - uses: actions/checkout@v3

    - name: Login to ACR
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.ACR_NAME }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build Frontend
      run: docker build -t ${{ env.ACR_NAME }}/nadra-frontend:${{ github.sha }} ./frontend

    - name: Trivy Scan Frontend
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ACR_NAME }}/nadra-frontend:${{ github.sha }}
        format: table
        exit-code: 1
        severity: CRITICAL

    - name: Push Frontend
      run: docker push ${{ env.ACR_NAME }}/nadra-frontend:${{ github.sha }}

    - name: Build Backend
      run: docker build -t ${{ env.ACR_NAME }}/nadra-backend:${{ github.sha }} ./backend

    - name: Trivy Scan Backend
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ACR_NAME }}/nadra-backend:${{ github.sha }}
        format: table
        exit-code: 1
        severity: CRITICAL

    - name: Push Backend
      run: docker push ${{ env.ACR_NAME }}/nadra-backend:${{ github.sha }}

    - name: Deploy to Dev
      run: |
        git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ env.INFRA_REPO }}
        cd nadra-infra
        sed -i "s|nadraacr.azurecr.io/nadra-frontend:.*|nadraacr.azurecr.io/nadra-frontend:${{ github.sha }}|g" dev/frontend/deployment.yaml
        sed -i "s|nadraacr.azurecr.io/nadra-backend:.*|nadraacr.azurecr.io/nadra-backend:${{ github.sha }}|g" dev/backend/deployment.yaml
        git config user.email "ci@nadra.gov.pk"
        git config user.name "NADRA CI"
        git add .
        git commit -m "ci: update dev image tags to ${{ github.sha }}"
        git push

  zap-scan:
    runs-on: ubuntu-latest
    needs: build-push-deploy-dev
    permissions:
      issues: write
    steps:
    - name: Wait for ArgoCD Dev Deploy
      run: sleep 60

    - name: OWASP ZAP Scan
      uses: zaproxy/action-full-scan@v0.10.0
      with:
        target: 'http://104.211.230.19'
        fail_action: false
        artifact_name: ''

  deploy-prod:
    runs-on: ubuntu-latest
    needs: zap-scan
    steps:
    - uses: actions/checkout@v3
    - name: Deploy to Prod
      run: |
        git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ env.INFRA_REPO }}
        cd nadra-infra
        sed -i "s|nadraacr.azurecr.io/nadra-frontend:.*|nadraacr.azurecr.io/nadra-frontend:${{ github.sha }}|g" prod/frontend/deployment.yaml
        sed -i "s|nadraacr.azurecr.io/nadra-backend:.*|nadraacr.azurecr.io/nadra-backend:${{ github.sha }}|g" prod/backend/deployment.yaml
        git config user.email "ci@nadra.gov.pk"
        git config user.name "NADRA CI"
        git add .
        git commit -m "ci: update prod image tags to ${{ github.sha }}"
        git push
